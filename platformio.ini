; RadioKit — PlatformIO build configuration
;
; Usage:
;   pio run                          → builds SerialTest (default, no BLE needed)
;   pio run -e BasicSwitch           → builds BasicSwitch
;   pio run -e JoystickMotor         → builds JoystickMotor
;   pio run -e SliderServo           → builds SliderServo
;   pio run -e SerialTest -t upload  → flash SerialTest to board

[platformio]
default_envs = SerialTest
src_dir = .

; ────────────────────────────────────────────────────────────
; Shared settings
; ────────────────────────────────────────────────────────────
[env]
platform      = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework    = arduino
board         = lolin_s3_mini
monitor_speed = 115200

; library.json in the repo root tells the LDF that src/ is the library.
; lib_extra_dirs makes the LDF search this repo root for that library.
lib_extra_dirs = .

lib_deps =
    h2zero/NimBLE-Arduino@^1.4.1

build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; ────────────────────────────────────────────────────────────
; Per-example environments — each sets its own src_dir
; ────────────────────────────────────────────────────────────

[env:SerialTest]
build_src_filter = -<*> +<examples/SerialTest/>

[env:BasicSwitch]
build_src_filter = -<*> +<examples/BasicSwitch/>

[env:JoystickMotor]
build_src_filter = -<*> +<examples/JoystickMotor/>

[env:SliderServo]
build_src_filter = -<*> +<examples/SliderServo/>
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.1
    madhephaestus/ESP32Servo@^3.0.6
