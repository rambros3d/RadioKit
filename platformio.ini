; RadioKit — PlatformIO build configuration
;
; Usage:
;   pio run                          → builds SerialTest (default)
;   pio run -e BasicSwitch           → builds BasicSwitch example
;   pio run -e JoystickMotor         → builds JoystickMotor example
;   pio run -e SliderServo           → builds SliderServo example
;   pio run -e SerialTest            → builds SerialTest example
;   pio run -e SerialTest -t upload  → flash to connected board

[platformio]
default_envs = SerialTest

; ────────────────────────────────────────────────────────────
; Shared settings inherited by all environments
; ────────────────────────────────────────────────────────────
[env]
platform     = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework   = arduino
board        = esp32-s3-devkitm-1
monitor_speed = 115200

; Point PlatformIO at the repo root so it finds RadioKit as a library.
; Do NOT use lib_dir here — that is for libraries the project owns as source;
; lib_extra_dirs tells the LDF where to search for installed libraries.
lib_extra_dirs = .

lib_deps =
    h2zero/NimBLE-Arduino@^1.4.1

build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; ────────────────────────────────────────────────────────────
; Per-example environments
; ────────────────────────────────────────────────────────────

; Default — no BLE, works over USB Serial with Web Serial / Android
[env:SerialTest]
src_dir = examples/SerialTest

; Toggle switch controls built-in LED
[env:BasicSwitch]
src_dir = examples/BasicSwitch

; Joystick → differential motor drive
[env:JoystickMotor]
src_dir = examples/JoystickMotor

; Slider → servo angle (requires ESP32Servo library)
[env:SliderServo]
src_dir = examples/SliderServo
lib_deps =
    h2zero/NimBLE-Arduino@^1.4.1
    madhephaestus/ESP32Servo@^3.0.6
