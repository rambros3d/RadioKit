<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RadioKit - BLE UI for Arduino</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="RadioKit: Control your Arduino from a smartphone — no server, no code generation, just BLE.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Premium Typography -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap">
  
  <!-- Theme: Simple Sleek -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  
  <style>
    :root {
      --theme-color: #6366f1;
      --base-font-family: 'Inter', system-ui, -apple-system, sans-serif;
      --code-font-family: 'JetBrains Mono', monospace;
    }

    body {
      font-family: var(--base-font-family);
      -webkit-font-smoothing: antialiased;
    }

    .markdown-section code {
      font-family: var(--code-font-family);
      font-size: 0.9em;
      border-radius: 4px;
      background-color: #f3f4f6;
    }

    .sidebar {
      background-color: #f9fafb;
      border-right: 1px solid #e5e7eb;
    }

    .sidebar-nav li a {
      font-size: 15px;
      font-weight: 500;
      color: #374151;
    }

    .sidebar-nav li.active > a {
      color: var(--theme-color);
      border-right: 3px solid var(--theme-color);
    }

    .app-name-link img {
      width: 120px;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script>
    window.$docsify = {
      name: 'RadioKit',
      repo: 'https://github.com/rambros3d/RadioKit',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 3,
      coverpage: false,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search docs...',
        noData: 'No results!',
        depth: 6
      },
      copyCode: {
        buttonText : 'Copy',
        errorText  : 'Error',
        successText: 'Copied'
      }
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Plugins -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-c.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-cpp.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-arduino.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-dart.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
