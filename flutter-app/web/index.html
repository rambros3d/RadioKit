<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#3A3939">
  <meta name="description" content="RadioKit — control your Arduino over BLE from the browser">

  <title>RadioKit</title>

  <!--
    Web Bluetooth API requirements:
    - Requires a secure context (https:// or localhost)
    - Supported browsers: Chrome 56+, Edge 79+, Chrome for Android 56+
    - NOT supported: Firefox, Safari
  -->

  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      background-color: #3A3939; /* Brand Charcoal */
      color: #FCFCFC; /* Brand White */
      font-family: sans-serif;
      transition: background-color 0.3s ease;
    }

    @media (prefers-color-scheme: light) {
      body {
        background-color: #FCFCFC;
        color: #3A3939;
      }
    }

    /* Loading indicator shown before Flutter initialises */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
    }
    #loading p {
      font-size: 14px;
      opacity: 0.6;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #908E8E; /* Neutral Gray */
      border-top-color: #F57A06; /* Brand Orange */
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading RadioKit…</p>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loading = document.getElementById('loading');
      if (loading) loading.style.display = 'none';
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
