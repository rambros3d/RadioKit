<svg width="400" height="100" viewBox="0 0 400 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="screen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1" />
    </linearGradient>
    <filter id="glass">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feSpecularLighting surfaceScale="5" specularConstant="0.8" specularExponent="20" lighting-color="#white" in="blur" result="specular">
        <fePointLight x="200" y="-50" z="300" />
      </feSpecularLighting>
      <feComposite in="specular" in2="SourceAlpha" operator="in" result="gloss"/>
      <feComposite in="SourceGraphic" in2="gloss" operator="over"/>
    </filter>
  </defs>
  <rect width="400" height="100" rx="8" fill="url(#screen)" filter="url(#glass)" />
  <!-- Subtle inner reflect -->
  <rect x="5" y="5" width="390" height="40" rx="4" fill="white" fill-opacity="0.03" />
</svg>
