<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="pit" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#050a14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1c2431;stop-opacity:1" />
    </radialGradient>
  </defs>
  <!-- Background shell -->
  <circle cx="100" cy="100" r="100" fill="#141a27" />
  <!-- Concave Pit -->
  <circle cx="100" cy="100" r="90" fill="url(#pit)" stroke="#2c3444" stroke-width="2" />
  <!-- Grid Lines -->
  <line x1="100" y1="20" x2="100" y2="180" stroke="white" stroke-opacity="0.1" />
  <line x1="20" y1="100" x2="180" y2="100" stroke="white" stroke-opacity="0.1" />
  <circle cx="100" cy="100" r="45" fill="none" stroke="white" stroke-opacity="0.05" />
</svg>
