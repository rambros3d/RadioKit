name: radiokit
description: RadioKit - BLE & USB Serial companion app for Arduino RadioKit library
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # BLE: Unified (All platforms)
  universal_ble: ^1.2.0

  # Serial: native Android USB-CDC (FTDI, CDC, CP210x, CH340 …)
  usb_serial: ^0.5.2

  # Serial: web (Web Serial API — Chrome/Edge)
  # https://pub.dev/packages/webserial
  webserial: ^1.1.0

  # Routing
  go_router: ^17.2.2

  # State management
  provider: ^6.1.2

  cupertino_icons: ^1.0.2
  shared_preferences: ^2.5.5
  google_fonts: ^8.0.2
  lucide_icons_flutter: ^3.1.12
  path_provider: ^2.1.3
  file_picker: ^11.0.2
  # Multi-mode Rendering
  flutter_svg: ^2.0.10+1
  archive: ^4.0.0
  flutter_joystick: ^0.2.2
  animated_toggle_switch: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  flutter_gen_runner: ^5.10.0

flutter:
  uses-material-design: true
  assets:
    - resources/skins/standard/
    - resources/skins/standard/global/
    - resources/skins/standard/button_push/
    - resources/skins/standard/button_toggle/
    - resources/skins/standard/toggle_switch/
    - resources/skins/standard/slider/
    - resources/skins/standard/joystick/
    - resources/skins/standard/knob/
    - resources/skins/standard/led/
    - resources/skins/standard/multiple_button/
    - resources/skins/standard/multiple_select/
    - resources/skins/standard/display/
    - resources/skins/standard/sounds/
    - resources/skins/debug/
    - resources/skins/neon/
    - resources/skins/neon/button_push/
    - resources/skins/neon/button_toggle/
    - resources/skins/neon/toggle_switch/
    - resources/skins/neon/slider/
    - resources/skins/neon/joystick/
    - resources/skins/neon/knob/
    - resources/skins/neon/led/
    - resources/skins/neon/multiple_button/
    - resources/skins/neon/multiple_select/
    - resources/skins/neon/display/
    - resources/skins/neon/global/
    - resources/skins/neon/sounds/
    - resources/skins/neon/text/

flutter_gen:
  output: lib/gen/
  line_length: 80
