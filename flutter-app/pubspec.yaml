name: radiokit
description: RadioKit - BLE & USB Serial companion app for Arduino RadioKit library
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # BLE: Unified (All platforms)
  universal_ble: ^1.2.0

  # Serial: native Android USB-CDC (FTDI, CDC, CP210x, CH340 …)
  usb_serial: ^0.5.2

  # Serial: web (Web Serial API — Chrome/Edge)
  # https://pub.dev/packages/webserial
  webserial: ^1.1.0

  # Routing
  go_router: ^17.2.2

  # State management
  provider: ^6.1.2

  cupertino_icons: ^1.0.2
  shared_preferences: ^2.5.5
  google_fonts: ^8.0.2
  lucide_icons_flutter: ^3.1.12
  path_provider: ^2.1.3
  file_picker: ^11.0.2
  # Multi-mode Rendering
  flutter_svg: ^2.0.10+1
  archive: ^4.0.0

  # RadioKit Widget Library
  radiokit_widgets:
    path: ../flutter-library
  geolocator: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  flutter_gen_runner: ^5.10.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_gen:
  output: lib/gen/
  line_length: 80

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "resources/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "resources/icon/app_icon.png"
    background_color: "#373737"
    theme_color: "#373737"
