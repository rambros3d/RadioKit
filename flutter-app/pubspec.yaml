name: radiokit
description: RadioKit - BLE & USB Serial companion app for Arduino RadioKit library
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # BLE: Unified (All platforms)
  universal_ble: ^1.2.0

  # Serial: native Android USB-CDC (FTDI, CDC, CP210x, CH340 …)
  usb_serial: ^0.5.2

  # Serial: web (Web Serial API — Chrome/Edge)
  # https://pub.dev/packages/webserial
  webserial: ^1.1.0

  # Routing
  go_router: ^14.8.0

  # State management
  provider: ^6.1.2

  cupertino_icons: ^1.0.2
  shared_preferences: ^2.5.5
  google_fonts: ^8.0.2
  lucide_icons_flutter: ^3.1.12
  archive: ^3.6.1
  path_provider: ^2.1.3
  file_picker: ^8.0.0+1
  # Multi-mode Rendering
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - resources/skins/default/
    - resources/skins/default/global/
    - resources/skins/default/button_push/
    - resources/skins/default/button_toggle/
    - resources/skins/default/switch/
    - resources/skins/default/slider/
    - resources/skins/default/joystick/
    - resources/skins/default/knob/
    - resources/skins/default/led/
    - resources/skins/default/multiple_button/
    - resources/skins/default/multiple_select/
    - resources/skins/default/display/
    - resources/skins/default/sounds/
