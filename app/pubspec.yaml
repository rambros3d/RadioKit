name: radiokit
description: RadioKit - BLE & USB Serial companion app for Arduino RadioKit library
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # BLE: native (Android/iOS)
  flutter_reactive_ble: ^5.3.1

  # BLE: web (Web Bluetooth API — Chrome/Edge)
  flutter_web_bluetooth: ^1.1.0

  # Serial: native (Android USB-CDC + desktop)
  usb_serial: ^2.7.0

  # Serial: web (Web Serial API — Chrome/Edge)
  flutter_web_serial: ^0.1.2

  # State management
  provider: ^6.1.2

  # Permissions for BLE on Android/iOS (not needed on web)
  permission_handler: ^11.3.1

  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
