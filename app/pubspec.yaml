name: radiokit
description: RadioKit - BLE & USB Serial companion app for Arduino RadioKit library
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # BLE: Unified (All platforms)
  universal_ble: ^1.2.0

  # Serial: native Android USB-CDC (FTDI, CDC, CP210x, CH340 …)
  usb_serial: ^0.5.2

  # Serial: web (Web Serial API — Chrome/Edge)
  # https://pub.dev/packages/webserial
  webserial: ^1.1.0

  # State management
  provider: ^6.1.2

  cupertino_icons: ^1.0.2
  shared_preferences: ^2.5.5
  google_fonts: ^8.0.2
  lucide_icons_flutter: ^3.1.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
